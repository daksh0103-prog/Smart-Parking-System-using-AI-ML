<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=Rajdhani:wght@500;600;700&amp;display=swap');
      @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
      @keyframes glowText{0%,100%{filter:drop-shadow(0 0 8px rgba(0,255,245,0.5))}50%{filter:drop-shadow(0 0 20px rgba(0,255,245,0.9))}}
      @keyframes rotateR{from{transform-origin:95px 95px;transform:rotate(0deg)}to{transform-origin:95px 95px;transform:rotate(360deg)}}
      @keyframes rotateL{from{transform-origin:95px 95px;transform:rotate(0deg)}to{transform-origin:95px 95px;transform:rotate(-360deg)}}
      .ring1{animation:rotateR 20s linear infinite;}
      .ring2{animation:rotateL 15s linear infinite;}
      .ps-text{animation:glowText 3s ease-in-out infinite;}
      .dot{animation:pulse 1.5s ease-in-out infinite;}
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020815"/>
      <stop offset="100%" stop-color="#040e20"/>
    </linearGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00fff5"/>
      <stop offset="50%" stop-color="#00b8ff"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>
    <linearGradient id="cb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="300" rx="4" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.05">
    <line x1="0" y1="75" x2="640" y2="75" stroke="#00fff5" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="640" y2="150" stroke="#00fff5" stroke-width="0.5"/>
    <line x1="0" y1="225" x2="640" y2="225" stroke="#00fff5" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="300" stroke="#00fff5" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="300" stroke="#00fff5" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="300" stroke="#00fff5" stroke-width="0.5"/>
  </g>

  <!-- Border -->
  <rect width="640" height="300" rx="4" fill="none" stroke="url(#cg)" stroke-width="1.5" opacity="0.5"/>
  <!-- Top line -->
  <rect width="640" height="2" rx="1" fill="url(#cg)" opacity="0.8"/>

  <!-- Corner brackets -->
  <path d="M0 30 L0 8 Q0 0 8 0 L30 0" fill="none" stroke="#00fff5" stroke-width="2"/>
  <path d="M640 30 L640 8 Q640 0 632 0 L610 0" fill="none" stroke="#7b61ff" stroke-width="2"/>
  <path d="M0 270 L0 292 Q0 300 8 300 L30 300" fill="none" stroke="#7b61ff" stroke-width="2"/>
  <path d="M640 270 L640 292 Q640 300 632 300 L610 300" fill="none" stroke="#00fff5" stroke-width="2"/>

  <!-- Rotating rings around car -->
  <circle class="ring1" cx="115" cy="145" r="95" fill="none" stroke="#00fff5" stroke-width="0.8" stroke-dasharray="4 8" opacity="0.2"/>
  <circle class="ring2" cx="115" cy="145" r="75" fill="none" stroke="#7b61ff" stroke-width="0.8" stroke-dasharray="3 12" opacity="0.2"/>

  <!-- Glow -->
  <radialGradient id="hg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00fff5" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
  </radialGradient>
  <circle cx="115" cy="145" r="90" fill="url(#hg)"/>

  <!-- Speed lines -->
  <line x1="20" y1="135" x2="60" y2="135" stroke="#00fff5" stroke-width="1.5" opacity="0.4"/>
  <line x1="14" y1="145" x2="58" y2="145" stroke="#00fff5" stroke-width="1" opacity="0.25"/>
  <line x1="20" y1="155" x2="55" y2="155" stroke="#7b61ff" stroke-width="1" opacity="0.3"/>

  <!-- Car body -->
  <rect x="68" y="148" width="110" height="28" rx="7" fill="#0a2a45"/>
  <rect x="68" y="148" width="110" height="28" rx="7" fill="none" stroke="#00b8ff" stroke-width="1.5" opacity="0.8"/>
  <!-- Cabin -->
  <path d="M88 148 L98 122 L148 122 L158 148 Z" fill="#0d3350"/>
  <path d="M88 148 L98 122 L148 122 L158 148 Z" fill="none" stroke="#00b8ff" stroke-width="1.2" opacity="0.7"/>
  <!-- Windows -->
  <path d="M102 124 L96 146 L120 146 L120 124 Z" fill="#001833" opacity="0.8"/>
  <path d="M124 124 L124 146 L148 146 L150 124 Z" fill="#001833" opacity="0.8"/>
  <line x1="122" y1="122" x2="122" y2="148" stroke="#00b8ff" stroke-width="1" opacity="0.5"/>
  <!-- Headlight -->
  <rect x="172" y="152" width="10" height="8" rx="2" fill="#00fff5" opacity="0.9"/>
  <ellipse cx="186" cy="156" rx="12" ry="7" fill="#00fff5" opacity="0.06"/>
  <!-- Tail light -->
  <rect x="65" y="152" width="7" height="8" rx="2" fill="#ff3060" opacity="0.9"/>
  <!-- Wheels -->
  <circle cx="92" cy="176" r="11" fill="#030d1a" stroke="#00b8ff" stroke-width="2"/>
  <circle cx="92" cy="176" r="4" fill="#00b8ff" opacity="0.4"/>
  <circle cx="92" cy="176" r="2" fill="#00fff5"/>
  <circle cx="155" cy="176" r="11" fill="#030d1a" stroke="#00b8ff" stroke-width="2"/>
  <circle cx="155" cy="176" r="4" fill="#00b8ff" opacity="0.4"/>
  <circle cx="155" cy="176" r="2" fill="#00fff5"/>
  <!-- Door line -->
  <line x1="122" y1="149" x2="122" y2="174" stroke="#00b8ff" stroke-width="0.8" opacity="0.4"/>
  <!-- Antenna -->
  <line x1="148" y1="122" x2="152" y2="112" stroke="#00fff5" stroke-width="1" opacity="0.5"/>
  <circle cx="152" cy="112" r="2" fill="#00fff5" opacity="0.7"/>

  <!-- Road line -->
  <rect x="40" y="268" width="560" height="2" rx="1" fill="url(#cg)" opacity="0.5"/>

  <!-- PARK text -->
  <text x="230" y="168"
    font-family="'Orbitron', monospace"
    font-size="60" font-weight="900"
    fill="#ffffff"
    letter-spacing="2"
    opacity="0.95">PARK</text>

  <!-- SMART text with gradient -->
  <text x="230" y="225"
    font-family="'Orbitron', monospace"
    font-size="60" font-weight="900"
    fill="url(#cg)"
    letter-spacing="2"
    class="ps-text">SMART</text>

  <!-- Accent line -->
  <rect x="230" y="232" width="370" height="2" rx="1" fill="url(#cg)" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="230" y="255"
    font-family="'Rajdhani', sans-serif"
    font-size="12" font-weight="600"
    fill="#00fff5"
    letter-spacing="5"
    opacity="0.4">AI-POWERED PARKING SYSTEM</text>

  <!-- Bottom bar -->
  <rect x="0" y="272" width="640" height="28" fill="#00fff5" opacity="0.03"/>
  <rect x="0" y="272" width="640" height="1" fill="url(#cg)" opacity="0.2"/>

  <!-- Status -->
  <circle class="dot" cx="24" cy="286" r="4" fill="#00ff88"/>
  <text x="36" y="290"
    font-family="'Rajdhani', sans-serif"
    font-size="10" font-weight="600"
    fill="#00ff88" letter-spacing="2" opacity="0.7">SYSTEM ONLINE</text>

  <text x="320" y="290"
    font-family="'Orbitron', monospace"
    font-size="9" text-anchor="middle"
    fill="#00fff5" letter-spacing="1" opacity="0.3">SYS:NODE-AUTH-01</text>

  <text x="616" y="290"
    font-family="'Orbitron', monospace"
    font-size="9" text-anchor="end"
    fill="#7b61ff" letter-spacing="1" opacity="0.4">DQN AI ACTIVE</text>
</svg>
